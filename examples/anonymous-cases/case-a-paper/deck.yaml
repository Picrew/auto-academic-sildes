deck_id: anonymous-paper-routing
title: Anonymous Paper Talk Case
subtitle: A synthetic paper-talk fixture with no real authors, institutions, or private data
visual_grammar: paper-atlas
footer: Anonymous Case A / Academic Deck Compiler
contact: synthetic fixture
assets_dir: examples/anonymous-cases/assets/images
slides:
  - kind: cover
    kicker: Case A
    title: Routing makes hidden uncertainty visible before release
    subtitle: A fictional paper-talk fixture with neutral labels and local evidence.
    metrics:
      - value: "1"
        label: central bet
      - value: "3"
        label: evidence moves
      - value: "0"
        label: real identities
    labels: [Problem, Method, Evidence, Boundary]
  - kind: thesis
    kicker: Claim
    title: Visible uncertainty turns one failure mode into a reviewable signal
    subtitle: The argument moves from observability to a small routing rule.
    metrics:
      - value: signal
        label: what becomes visible
      - value: route
        label: where review changes
      - value: scope
        label: what stays bounded
    bullets:
      - Baseline outputs look acceptable until uncertain cases are separated.
      - The route does not claim a universal gain; it makes one failure mode inspectable.
      - The result slide should show the boundary of the claim as clearly as the gain.
  - kind: matrix
    layout: matrix-ledger
    kicker: Method
    title: Explain the paper as three review decisions
    subtitle: Each decision changes what becomes inspectable.
    labels: [Expose signal, Route cases, Recheck boundary, Decision ledger]
    metrics:
      - value: "3"
        label: decisions
      - value: trace
        label: evidence unit
      - value: route
        label: intervention
      - value: scope
        label: claim boundary
    bullets:
      - Represent uncertainty as a trace that can be sorted.
      - Route only the uncertain band into a slower review path.
      - Keep the claim scoped to the synthetic task where the signal is measured.
      - Compare only decisions that change what the reviewer can inspect.
  - kind: evidence
    layout: proof-showcase
    kicker: Synthetic result
    title: Routing improves after uncertainty becomes visible
    subtitle: The figure uses fictional local values.
    image: case_a_routing_ablation.png
    evidence:
      image: case_a_routing_ablation.png
      crop: {x: 0.03, y: 0.05, w: 0.94, h: 0.88}
      caption: "Synthetic ablation ledger: baseline route versus reviewable routed variant."
      source: "Local anonymous fixture image generated for Case A in examples/anonymous-cases/assets/images."
      callouts: []
    bullets: []
  - kind: close
    kicker: Takeaway
    title: End with the measured bet
    subtitle: Name intervention, proof, boundary, and the synthetic limit without overstating the fixture.
    metrics:
      - value: signal
        label: measured
      - value: proof
        label: inspected
      - value: scope
        label: preserved
      - value: next
        label: discussion hook
    labels: [Measured signal, Modest route, Clear boundary, Q&A hooks]
    bullets:
      - State what changed in the evaluation loop.
      - Name the exact proof surface that supports the claim.
      - Keep the unknowns visible enough for discussion.
      - Leave the synthetic boundary explicit.
